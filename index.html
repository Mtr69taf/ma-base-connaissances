<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base de connaissances</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Inter, sans-serif;
background:#0d0d0d;
color:#eaeaea;
min-height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* BACKGROUND IMMERSIF */

#themeOverlay{
position:fixed;
inset:0;
z-index:0;
background-size:cover;
background-position:center;
filter:blur(6px) brightness(0.35);
opacity:0;
transition:opacity .8s ease;
}

#themeOverlay.visible{
opacity:1;
}

header,main{
position:relative;
z-index:2;
}

/* HEADER */

header{
padding:25px 40px;
border-bottom:1px solid #2a2a2a;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-family:"Playfair Display",serif;
font-size:28px;
letter-spacing:-0.5px;
}

.search{
background:#1b1b1b;
border:1px solid #333;
padding:8px 14px;
border-radius:6px;
color:white;
}

/* MAIN */

main{
flex:1;
display:flex;
}

/* SIDEBAR */

aside{
width:260px;
border-right:1px solid #2a2a2a;
padding:25px 15px;
overflow:auto;
background:rgba(15,15,15,.6);
backdrop-filter:blur(10px);
}

.folder{
padding:10px 10px;
cursor:pointer;
border-radius:6px;
margin-bottom:5px;
font-size:14px;
}

.folder:hover{
background:#1f1f1f;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

/* CARDS */

.card{
background:rgba(20,20,20,.7);
border:1px solid #333;
border-radius:10px;
padding:20px;
cursor:pointer;
transition:.2s;
backdrop-filter:blur(8px);
}

.card:hover{
transform:translateY(-5px);
border-color:#c8a96e;
}

.card h3{
font-size:16px;
margin-top:10px;
}

/* WELCOME */

.welcome{
display:flex;
align-items:center;
justify-content:center;
height:100%;
flex-direction:column;
gap:15px;
opacity:.7;
}

.welcome h2{
font-family:"Playfair Display";
font-size:32px;
}

/* THEMES */

.theme-christianisme{
--accent:#d4a853;
}

.theme-islam{
--accent:#4caf82;
}

.theme-philosophie{
--accent:#d4a853;
}

.theme-sciences{
--accent:#48b8d0;
}

.theme-politique{
--accent:#5b8fd4;
}

.theme-livres{
--accent:#b87c4a;
}

</style>

</head>

<body>

<div id="themeOverlay"></div>

<header>

<h1>Base de Connaissances</h1>

<input class="search" placeholder="Rechercher...">

</header>

<main>

<aside>

<div class="folder" onclick="setTheme('christianisme')">✝ Christianisme</div>

<div class="folder" onclick="setTheme('islam')">☪ Islam</div>

<div class="folder" onclick="setTheme('philosophie')">🏛 Philosophie</div>

<div class="folder" onclick="setTheme('sciences')">🔬 Sciences</div>

<div class="folder" onclick="setTheme('politique')">🏛 Politique</div>

<div class="folder" onclick="setTheme('livres')">📚 Livres</div>

</aside>

<div class="content">

<div class="welcome">

<h2>Bibliothèque de savoir</h2>

<p>Sélectionne un domaine à gauche pour explorer les documents.</p>

</div>

</div>

</main>

<script>

const images={

christianisme:
"https://images.unsplash.com/photo-1609592806951-3b6e9b9e2f4e",

islam:
"https://images.unsplash.com/photo-1591608511733-5a54a3937b38",

philosophie:
"https://images.unsplash.com/photo-1505666287802-931dc83948e9",

sciences:
"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",

politique:
"https://images.unsplash.com/photo-1529101091764-c3526daf38fe",

livres:
"https://images.unsplash.com/photo-1512820790803-83ca734da794"

};

function setTheme(theme){

document.body.className="theme-"+theme;

const overlay=document.getElementById("themeOverlay");

overlay.style.backgroundImage="url("+images[theme]+")";

overlay.classList.add("visible");

}

</script>

</body>

</html>
